services:
  backend:
    image: maven:3.9.11-eclipse-temurin-21
    working_dir: /workspace
    command: mvn -pl discounter-backend spring-boot:run
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - .:/workspace
      - maven-cache:/root/.m2

  frontend:
    image: node:22-bookworm-slim
    working_dir: /workspace
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_API_BASE_URL: "http://localhost:${BACKEND_PORT:-8080}"
    ports:
      - "5173:5173"
    volumes:
      - ./discounter-frontend:/workspace
      - frontend-node-modules:/workspace/node_modules
    depends_on:
      - backend

  cli:
    image: maven:3.9.11-eclipse-temurin-21
    working_dir: /workspace
    command: sh -c "mvn -q -pl discounter-cli -am -DskipTests package && java -jar discounter-cli/target/discounter-cli-0.1.0-SNAPSHOT.jar list --plz 65185"
    environment:
      BACKEND_URL: http://backend:8080
    volumes:
      - .:/workspace
      - maven-cache:/root/.m2
    depends_on:
      - backend
    profiles:
      - cli

volumes:
  maven-cache:
  frontend-node-modules:
