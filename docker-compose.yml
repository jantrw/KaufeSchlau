services:
  backend:
    build:
      context: .
      dockerfile: discounter-backend/Dockerfile
    ports:
      - "${BACKEND_PORT:-8080}:8080"

  frontend:
    build:
      context: ./discounter-frontend
      args:
        VITE_API_BASE_URL: "http://localhost:${BACKEND_PORT:-8080}"
    ports:
      - "5173:80"
    depends_on:
      - backend

  cli:
    image: maven:3.9.11-eclipse-temurin-21
    working_dir: /workspace
    command: sh -c "mvn -q -pl discounter-cli -am -DskipTests package && java -jar discounter-cli/target/discounter-cli-0.1.0-SNAPSHOT.jar list --plz 65185"
    environment:
      BACKEND_URL: http://backend:8080
    volumes:
      - .:/workspace
      - maven-cache:/root/.m2
    depends_on:
      - backend
    profiles:
      - cli

volumes:
  maven-cache:
